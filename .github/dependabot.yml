version: 2
updates:
  - package-ecosystem: "nuget"
    directory: "/"
    schedule:
      interval: "daily"
      time: "07:00"
      timezone: "Asia/Ho_Chi_Minh"
    open-pull-requests-limit: 15
    labels:
      - "dependencies"
      - "automerge"
      - "nuget"
    reviewers:
      - "realmg51-cpu"  # Kiểm tra username tồn tại
    assignees:
      - "realmg51-cpu"
    versioning-strategy: "auto"
    groups:
      minor-and-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    ignore:
      - dependency-name: "Microsoft.NET.Test.Sdk"
        versions: ["18.x.x"]
      - dependency-name: "System.Text.Json"
        versions: [">=9.0.0"]
      # BỎ HOẶC SỬA dòng dưới:
      # - dependency-name: "*"
      #   update-types: ["version-update:semver-prerelease"]
