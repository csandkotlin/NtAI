name: Create Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g., v1.0.0)'
        required: true
        type: string
      is_prerelease:
        description: 'Pre-release?'
        type: boolean
        default: false
      is_latest:
        description: 'Set as latest?'
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0
      
      - name: Build self-contained for Windows
        run: |
          dotnet publish src/main/NtAI.csproj \
            -c Release \
            -r win-x64 \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:PublishTrimmed=true \
            -o publish
      
      - name: Rename executable
        run: |
          mv publish/NtAI.exe "publish/NtAI-${{ github.event.inputs.version }}.exe"
      
      - name: Generate changelog (skip invalid commits)
        id: changelog
        run: |
          # Lấy tag gần nhất
          PREV_TAG=$(git tag --sort=-creatordate | head -n1)
          
          # Lấy danh sách commit
          if [ -z "$PREV_TAG" ]; then
            COMMITS=$(git log --oneline --format="%s")
          else
            COMMITS=$(git log $PREV_TAG..HEAD --oneline --format="%s")
          fi
          
          # Bắt đầu tạo changelog
          if [ -z "$PREV_TAG" ]; then
            echo "## 🎉 Initial Release" > changelog.md
            echo "" >> changelog.md
            echo "Welcome to NtAI - A rule-based chatbot for beginners!" >> changelog.md
            echo "" >> changelog.md
          else
            echo "## What's Changed" > changelog.md
            echo "" >> changelog.md
          fi
          
          FEATS=""
          FIXES=""
          OTHERS=""
          SKIPPED=0
          
          # Duyệt từng commit
          while IFS= read -r commit; do
            # Kiểm tra commit chuẩn (có type hợp lệ)
            if [[ "$commit" =~ ^(feat|fix|docs|style|refactor|test|chore|ci):\  ]]; then
              # Lấy subject (bỏ type và dấu cách)
              subject=$(echo "$commit" | sed 's/^[a-z]*: //')
              
              if [[ "$commit" =~ ^feat: ]]; then
                FEATS="$FEATS- ✨ $subject\n"
              elif [[ "$commit" =~ ^fix: ]]; then
                FIXES="$FIXES- 🐛 $subject\n"
              else
                OTHERS="$OTHERS- 📦 $subject\n"
              fi
            else
              # Commit không chuẩn -> skip, chỉ đếm
              SKIPPED=$((SKIPPED + 1))
            fi
          done <<< "$COMMITS"
          
          # Ghi các section vào changelog
          if [ -n "$FEATS" ]; then
            echo "### ✨ New Features" >> changelog.md
            echo -e "$FEATS" >> changelog.md
            echo "" >> changelog.md
          fi
          
          if [ -n "$FIXES" ]; then
            echo "### 🐛 Bug Fixes" >> changelog.md
            echo -e "$FIXES" >> changelog.md
            echo "" >> changelog.md
          fi
          
          if [ -n "$OTHERS" ]; then
            echo "### 📦 Other Changes" >> changelog.md
            echo -e "$OTHERS" >> changelog.md
            echo "" >> changelog.md
          fi
          
          # Thông báo số commit bị skip
          if [ $SKIPPED -gt 0 ]; then
            echo "---" >> changelog.md
            echo "" >> changelog.md
            echo "⚠️ **Note:** $SKIPPED commit(s) were skipped due to invalid format." >> changelog.md
            echo "Valid format: \`type: subject\` (feat, fix, docs, style, refactor, test, chore, ci)" >> changelog.md
          fi
          
          # Thêm download section
          echo "" >> changelog.md
          echo "---" >> changelog.md
          echo "" >> changelog.md
          echo "### 📥 Download" >> changelog.md
          echo "- **NtAI-${{ github.event.inputs.version }}.exe** - Single file, self-contained, Windows x64" >> changelog.md
          
          # In ra số lượng commit (để debug)
          echo "Generated changelog with:"
          echo "  - Features: $(echo "$FEATS" | grep -c '✨' || echo 0)"
          echo "  - Fixes: $(echo "$FIXES" | grep -c '🐛' || echo 0)"
          echo "  - Skipped: $SKIPPED"
      
      - name: Create Tag and Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: Release ${{ github.event.inputs.version }}
          body_path: changelog.md
          files: |
            publish/NtAI-${{ github.event.inputs.version }}.exe
          prerelease: ${{ github.event.inputs.is_prerelease }}
          make_latest: ${{ github.event.inputs.is_latest }}
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
