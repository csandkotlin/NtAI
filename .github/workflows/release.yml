name: Create Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g., v1.0.0)'
        required: true
        type: string
      is_prerelease:
        description: 'Pre-release?'
        type: boolean
        default: false
      is_latest:
        description: 'Set as latest?'
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0
      
      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-
      
      - name: Validate version format
        run: |
          if [[ ! "${{ github.event.inputs.version }}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+ ]]; then
            echo "Error: Version must start with 'v' followed by semver (e.g., v1.0.0)"
            exit 1
          fi
      
      - name: Find project file
        id: find_project
        run: |
          PROJECT_FILE=$(find . -name "*.csproj" -not -path "*/obj/*" -not -path "*/bin/*" | head -n 1)
          if [ -z "$PROJECT_FILE" ]; then
            echo "ERROR: No .csproj file found!"
            exit 1
          fi
          echo "project_file=$PROJECT_FILE" >> $GITHUB_OUTPUT
          echo "project_name=$(basename "$PROJECT_FILE" .csproj)" >> $GITHUB_OUTPUT
          echo "Found project file: $PROJECT_FILE"
      
      - name: Restore dependencies
        run: |
          dotnet restore "${{ steps.find_project.outputs.project_file }}"
      
      - name: Build self-contained for Windows
        run: |
          dotnet publish "${{ steps.find_project.outputs.project_file }}" \
            -c Release \
            -r win-x64 \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:PublishTrimmed=true \
            -p:DebugType=none \
            -p:DebugSymbols=false \
            -o publish
      
      - name: Rename executable
        id: rename_executable
        run: |
          PROJECT_NAME="${{ steps.find_project.outputs.project_name }}"
          if [ ! -f "publish/${PROJECT_NAME}.exe" ]; then
            echo "ERROR: Build failed - executable not found!"
            ls -la publish/
            exit 1
          fi
          mv "publish/${PROJECT_NAME}.exe" "publish/${PROJECT_NAME}-${{ github.event.inputs.version }}.exe"
          echo "exe_path=publish/${PROJECT_NAME}-${{ github.event.inputs.version }}.exe" >> $GITHUB_OUTPUT
          echo "exe_name=${PROJECT_NAME}-${{ github.event.inputs.version }}.exe" >> $GITHUB_OUTPUT
      
      - name: Generate SHA256 checksum
        id: checksum
        run: |
          EXE_PATH="${{ steps.rename_executable.outputs.exe_path }}"
          if [ ! -f "$EXE_PATH" ]; then
            echo "ERROR: Executable not found at $EXE_PATH"
            exit 1
          fi
          
          sha256sum "$EXE_PATH" > "${EXE_PATH}.sha256"
          
          cd publish
          sha256sum * > checksums.sha256
          cd ..
          
          CHECKSUM=$(sha256sum "$EXE_PATH" | cut -d ' ' -f 1)
          echo "checksum=$CHECKSUM" >> $GITHUB_OUTPUT
          echo "✅ SHA256: $CHECKSUM"
      
      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-creatordate | head -n1)
          
          if [ -z "$PREV_TAG" ]; then
            echo "No previous tag found, using all commits"
            COMMITS=$(git log --oneline --format="%s" | head -n 100)
          else
            echo "Previous tag: $PREV_TAG"
            COMMITS=$(git log ${PREV_TAG}..HEAD --oneline --format="%s")
          fi
          
          # Tạo changelog
          echo "# ${{ github.event.inputs.version }} ($(date +'%Y-%m-%d'))" > changelog.md
          echo "" >> changelog.md
          
          if [ -z "$PREV_TAG" ]; then
            echo "## 🎉 Initial Release" >> changelog.md
            echo "" >> changelog.md
            echo "Welcome to NtAI - A rule-based chatbot for beginners!" >> changelog.md
            echo "" >> changelog.md
          else
            echo "## What's Changed" >> changelog.md
            echo "" >> changelog.md
          fi
          
          if [ -z "$COMMITS" ]; then
            echo "### No Changes" >> changelog.md
            echo "" >> changelog.md
            echo "This release contains no code changes from the previous version." >> changelog.md
          else
            BREAKING=""
            FEATS=""
            FIXES=""
            DOCS=""
            STYLE=""
            REFACTOR=""
            TEST=""
            CHORE=""
            CI=""
            PERF=""
            OTHER=""
            SKIPPED=0
            TOTAL=0
            
            # Hàm xử lý commit message với nhiều biến thể
            while IFS= read -r commit; do
              if [ -z "$commit" ]; then
                continue
              fi
              
              TOTAL=$((TOTAL + 1))
              
              # Pattern mở rộng cho Conventional Commits:
              # type(scope)!: subject
              # TYPE(scope): subject (cho phép uppercase)
              # type: subject (cho phép subject viết hoa đầu, kết thúc bằng dấu chấm)
              
              # Chuẩn hóa: chuyển type về lowercase để dễ xử lý, nhưng giữ nguyên subject
              # Lấy type (phần trước dấu :)
              TYPE=$(echo "$commit" | sed -E 's/^([a-zA-Z]+)(\([^)]*\))?(!)?:.*/\1/' | tr '[:upper:]' '[:lower:]')
              HAS_BREAKING=$(echo "$commit" | grep -q '!:' && echo "true" || echo "false")
              # Lấy subject (bỏ phần type và scope, giữ nguyên case)
              SUBJECT=$(echo "$commit" | sed -E 's/^[a-zA-Z]+(\([^)]*\))?!?:[[:space:]]*//' | sed 's/[[:space:]]*$//')
              
              # Bỏ qua subject trống
              if [ -z "$SUBJECT" ]; then
                SKIPPED=$((SKIPPED + 1))
                continue
              fi
              
              # Xóa dấu chấm cuối nếu có (cho mục đích hiển thị)
              SUBJECT_CLEAN=$(echo "$SUBJECT" | sed 's/\.$//')
              
              # Kiểm tra xem có phải conventional commit không
              case "$TYPE" in
                feat|feature)
                  if [ "$HAS_BREAKING" = "true" ]; then
                    BREAKING="${BREAKING}- 💥 **BREAKING:** $SUBJECT_CLEAN\n"
                  else
                    FEATS="${FEATS}- ✨ $SUBJECT_CLEAN\n"
                  fi
                  ;;
                fix|bugfix)
                  if [ "$HAS_BREAKING" = "true" ]; then
                    BREAKING="${BREAKING}- 💥 **BREAKING:** $SUBJECT_CLEAN\n"
                  else
                    FIXES="${FIXES}- 🐛 $SUBJECT_CLEAN\n"
                  fi
                  ;;
                docs)
                  DOCS="${DOCS}- 📝 $SUBJECT_CLEAN\n"
                  ;;
                style|format)
                  STYLE="${STYLE}- 💄 $SUBJECT_CLEAN\n"
                  ;;
                refactor)
                  REFACTOR="${REFACTOR}- ♻️ $SUBJECT_CLEAN\n"
                  ;;
                test)
                  TEST="${TEST}- ✅ $SUBJECT_CLEAN\n"
                  ;;
                chore|build|deps|dependencies)
                  CHORE="${CHORE}- 🔧 $SUBJECT_CLEAN\n"
                  ;;
                ci)
                  CI="${CI}- 👷 $SUBJECT_CLEAN\n"
                  ;;
                perf|performance)
                  PERF="${PERF}- ⚡ $SUBJECT_CLEAN\n"
                  ;;
                revert)
                  OTHER="${OTHER}- ⏪️ $SUBJECT_CLEAN\n"
                  ;;
                *)
                  # Cho phép các type tùy chỉnh khác
                  if [ -n "$TYPE" ] && [ "$TYPE" != "$commit" ]; then
                    OTHER="${OTHER}- 📦 **$TYPE:** $SUBJECT_CLEAN\n"
                  else
                    # Không phải conventional commit format
                    SKIPPED=$((SKIPPED + 1))
                  fi
                  ;;
              esac
            done <<< "$COMMITS"
            
            # Thêm breaking changes (ưu tiên lên đầu)
            if [ -n "$BREAKING" ]; then
              echo "### 💥 Breaking Changes" >> changelog.md
              echo "" >> changelog.md
              echo -e "$BREAKING" >> changelog.md
              echo "" >> changelog.md
            fi
            
            if [ -n "$FEATS" ]; then
              echo "### ✨ New Features" >> changelog.md
              echo "" >> changelog.md
              echo -e "$FEATS" >> changelog.md
              echo "" >> changelog.md
            fi
            
            if [ -n "$FIXES" ]; then
              echo "### 🐛 Bug Fixes" >> changelog.md
              echo "" >> changelog.md
              echo -e "$FIXES" >> changelog.md
              echo "" >> changelog.md
            fi
            
            if [ -n "$PERF" ]; then
              echo "### ⚡ Performance Improvements" >> changelog.md
              echo "" >> changelog.md
              echo -e "$PERF" >> changelog.md
              echo "" >> changelog.md
            fi
            
            if [ -n "$DOCS" ]; then
              echo "### 📝 Documentation" >> changelog.md
              echo "" >> changelog.md
              echo -e "$DOCS" >> changelog.md
              echo "" >> changelog.md
            fi
            
            if [ -n "$STYLE" ]; then
              echo "### 💄 Code Style" >> changelog.md
              echo "" >> changelog.md
              echo -e "$STYLE" >> changelog.md
              echo "" >> changelog.md
            fi
            
            if [ -n "$REFACTOR" ]; then
              echo "### ♻️ Refactoring" >> changelog.md
              echo "" >> changelog.md
              echo -e "$REFACTOR" >> changelog.md
              echo "" >> changelog.md
            fi
            
            if [ -n "$TEST" ]; then
              echo "### ✅ Tests" >> changelog.md
              echo "" >> changelog.md
              echo -e "$TEST" >> changelog.md
              echo "" >> changelog.md
            fi
            
            if [ -n "$CI" ]; then
              echo "### 👷 CI/CD" >> changelog.md
              echo "" >> changelog.md
              echo -e "$CI" >> changelog.md
              echo "" >> changelog.md
            fi
            
            if [ -n "$CHORE" ]; then
              echo "### 🔧 Maintenance" >> changelog.md
              echo "" >> changelog.md
              echo -e "$CHORE" >> changelog.md
              echo "" >> changelog.md
            fi
            
            if [ -n "$OTHER" ]; then
              echo "### 📦 Other Changes" >> changelog.md
              echo "" >> changelog.md
              echo -e "$OTHER" >> changelog.md
              echo "" >> changelog.md
            fi
            
            if [ -z "$BREAKING" ] && [ -z "$FEATS" ] && [ -z "$FIXES" ] && [ -z "$PERF" ] && [ -z "$DOCS" ] && [ -z "$STYLE" ] && [ -z "$REFACTOR" ] && [ -z "$TEST" ] && [ -z "$CI" ] && [ -z "$CHORE" ] && [ -z "$OTHER" ]; then
              echo "### No valid changes" >> changelog.md
              echo "" >> changelog.md
              echo "No commits with valid format found in this release." >> changelog.md
              echo "" >> changelog.md
            fi
            
            if [ $SKIPPED -gt 0 ]; then
              echo "---" >> changelog.md
              echo "" >> changelog.md
              echo "⚠️ **Note:** $SKIPPED commit(s) were skipped due to invalid format." >> changelog.md
              echo "" >> changelog.md
              echo "Valid format: \`type(scope)!: subject\`" >> changelog.md
              echo "" >> changelog.md
              echo "Supported types: \`feat\`, \`fix\`, \`docs\`, \`style\`, \`refactor\`, \`test\`, \`chore\`, \`ci\`, \`perf\`, \`revert\`" >> changelog.md
            fi
          fi
          
          echo "" >> changelog.md
          echo "---" >> changelog.md
          echo "" >> changelog.md
          echo "### 📥 Download" >> changelog.md
          echo "- **${{ steps.rename_executable.outputs.exe_name }}** - Single file, self-contained, Windows x64" >> changelog.md
          echo "- **SHA256 Checksum:** \`${{ steps.checksum.outputs.checksum }}\`" >> changelog.md
          echo "" >> changelog.md
          echo "**Verify download:**" >> changelog.md
          echo '```bash' >> changelog.md
          echo "sha256sum ${{ steps.rename_executable.outputs.exe_name }}" >> changelog.md
          echo "# Expected output: ${{ steps.checksum.outputs.checksum }}" >> changelog.md
          echo '```' >> changelog.md
          
          echo "Changelog generated successfully"
      
      - name: Create tag
        id: create_tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          if git rev-parse "${{ github.event.inputs.version }}" >/dev/null 2>&1; then
            echo "⚠️ Tag ${{ github.event.inputs.version }} already exists"
            echo "tag_exists=true" >> $GITHUB_OUTPUT
          else
            git tag -a "${{ github.event.inputs.version }}" -m "Release ${{ github.event.inputs.version }}"
            git push origin "${{ github.event.inputs.version }}"
            echo "✅ Created and pushed tag ${{ github.event.inputs.version }}"
            echo "tag_exists=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: Release ${{ github.event.inputs.version }}
          body_path: changelog.md
          files: |
            ${{ steps.rename_executable.outputs.exe_path }}
            ${{ steps.rename_executable.outputs.exe_path }}.sha256
            publish/checksums.sha256
          prerelease: ${{ github.event.inputs.is_prerelease }}
          make_latest: ${{ github.event.inputs.is_latest }}
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
